<!doctype html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Conecta 4 · Ganes</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔴</text></svg>" />
  <link rel="stylesheet" href="../../assets/css/base.css" />
  <link rel="stylesheet" href="../../assets/css/game.css" />
</head>
<body>
  <header class="top-bar">
    <a class="back-link" href="../../">← Volver</a>
    <div class="brand">🔴 Conecta 4</div>
    <div class="top-actions">
      <button data-sound-toggle>🔊</button>
      <button data-theme-toggle>☀︎</button>
    </div>
  </header>

  <main class="game-shell">
    <div class="modes">
      <button class="mode-btn active" data-mode="ai">vs CPU</button>
      <button class="mode-btn" data-mode="2p">2 jugadores</button>
    </div>

    <div class="scoreboard">
      <div class="score-box"><div class="label">Rojo</div><div class="value" id="redScore">0</div></div>
      <div class="score-box"><div class="label">Amarillo</div><div class="value" id="yellowScore">0</div></div>
    </div>

    <div class="board-wrap">
      <canvas id="board" class="board" width="560" height="480" aria-label="Tablero de Conecta 4"></canvas>
    </div>

    <div class="message" id="msg">Turno de Rojo</div>

    <div class="controls">
      <button id="reset" class="primary">Nueva partida</button>
    </div>

    <p class="hint">Tap/click sobre una columna para soltar la ficha. Conecta 4 en línea para ganar.</p>
  </main>

  <script type="module" src="./conecta4.js"></script>
</body>
</html>
