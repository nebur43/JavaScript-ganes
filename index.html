<!doctype html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f1a" />
  <title>Ganes · Juegos en JavaScript</title>
  <meta name="description" content="8 juegos clásicos jugables en móvil y escritorio. Snake, Tetris, 2048, Pong y más. Gratis, sin instalación." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
  <link rel="stylesheet" href="assets/css/base.css" />
</head>
<body>
  <header class="top-bar">
    <div class="brand">⚡ Ganes</div>
    <div class="top-actions">
      <button data-sound-toggle aria-label="Silenciar">🔊</button>
      <button data-theme-toggle aria-label="Cambiar tema">☀︎</button>
    </div>
  </header>

  <main>
    <h1>Juegos clásicos en tu navegador</h1>
    <p class="lead">Jugables en móvil y escritorio. Tus récords se guardan localmente.</p>

    <section class="grid" id="games"></section>
  </main>

  <footer>Hecho con HTML, CSS y JavaScript vanilla.</footer>

  <script type="module">
    import { initTheme } from './assets/js/theme.js';
    import { initSound } from './assets/js/sound.js';
    import { getHighScore, getPref } from './assets/js/storage.js';

    initTheme();
    initSound();

    const games = [
      { id: 'snake',         name: 'Snake',         emoji: '🐍', href: 'games/snake/',         scoreLabel: 'Récord' },
      { id: 'tetris',        name: 'Tetris',        emoji: '🟦', href: 'games/tetris/',        scoreLabel: 'Récord' },
      { id: '2048',          name: '2048',          emoji: '🔢', href: 'games/2048/',          scoreLabel: 'Récord' },
      { id: 'tres-en-raya',  name: 'Tres en raya',  emoji: '❌', href: 'games/tres-en-raya/',  scoreLabel: 'Victorias' },
      { id: 'memorice',      name: 'Memorice',      emoji: '🧠', href: 'games/memorice/',      scoreLabel: 'Mejor (mov.)' },
      { id: 'pong',          name: 'Pong',          emoji: '🏓', href: 'games/pong/',          scoreLabel: 'Récord' },
      { id: 'ahorcado',      name: 'Ahorcado',      emoji: '🔤', href: 'games/ahorcado/',      scoreLabel: 'Victorias' },
      { id: 'conecta-4',     name: 'Conecta 4',     emoji: '🔴', href: 'games/conecta-4/',     scoreLabel: 'Victorias' },
    ];

    const root = document.getElementById('games');
    for (const g of games) {
      let display;
      if (g.id === 'memorice') {
        const m = getPref('memorice_best', '');
        display = m ? `${m} mov.` : '—';
      } else {
        const hs = getHighScore(g.id);
        display = hs > 0 ? hs : '—';
      }
      const a = document.createElement('a');
      a.className = 'card';
      a.href = g.href;
      a.innerHTML = `
        <div class="emoji">${g.emoji}</div>
        <div class="name">${g.name}</div>
        <div class="hs">${g.scoreLabel}: ${display}</div>
        <div class="cta">Jugar →</div>
      `;
      root.appendChild(a);
    }
  </script>
</body>
</html>
