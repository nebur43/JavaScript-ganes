<!doctype html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Ahorcado · Ganes</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔤</text></svg>" />
  <link rel="stylesheet" href="../../assets/css/base.css" />
  <link rel="stylesheet" href="../../assets/css/game.css" />
  <style>
    .hangman-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
    }
    .word {
      font-size: clamp(22px, 6vw, 38px);
      letter-spacing: 0.3em;
      font-weight: 700;
      min-height: 1.5em;
      text-transform: uppercase;
    }
    .word .letter { display: inline-block; min-width: .8em; border-bottom: 2px solid var(--fg-dim); margin: 0 2px; }
    .word .letter.revealed { border-bottom-color: transparent; }
    .keyboard {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      width: min(96vw, 520px);
    }
    .keyboard button {
      padding: 10px 0;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 15px;
      min-height: 44px;
    }
    .keyboard button.used { opacity: .35; cursor: default; pointer-events: none; }
    .keyboard button.hit { background: rgba(74, 222, 128, 0.25); border-color: var(--good); }
    .keyboard button.miss { background: rgba(255, 93, 108, 0.18); border-color: var(--bad); }
    /* En móvil: 6 columnas para botones más grandes */
    @media (max-width: 420px) {
      .keyboard {
        grid-template-columns: repeat(6, 1fr);
        gap: 5px;
      }
      .keyboard button {
        padding: 11px 0;
        font-size: 14px;
      }
    }
    svg.gallows { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 6px; }
  </style>
</head>
<body>
  <header class="top-bar">
    <a class="back-link" href="../../">← Volver</a>
    <div class="brand">🔤 Ahorcado</div>
    <div class="top-actions">
      <button data-sound-toggle>🔊</button>
      <button data-theme-toggle>☀︎</button>
    </div>
  </header>

  <main class="game-shell">
    <div class="scoreboard">
      <div class="score-box"><div class="label">Vidas</div><div class="value" id="lives">6</div></div>
      <div class="score-box"><div class="label">Victorias</div><div class="value" id="wins">0</div></div>
    </div>

    <div class="hangman-area">
      <svg class="gallows" id="gallows" viewBox="0 0 200 220" width="180" height="200" aria-hidden="true"></svg>
      <div class="word" id="word"></div>
    </div>

    <div class="message" id="msg"></div>
    <div class="keyboard" id="keyboard"></div>

    <div class="controls">
      <button id="reset" class="primary">Nueva palabra</button>
    </div>

    <p class="hint">Adivina la palabra antes de quedarte sin vidas. Letras del teclado o tapea en el panel.</p>
  </main>

  <script type="module" src="./ahorcado.js"></script>
</body>
</html>
